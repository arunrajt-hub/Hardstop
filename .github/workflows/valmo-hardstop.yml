# Valmo Hardstop - Run at 4 PM & 10 PM IST
# 4 PM IST = 10:30 UTC, 10 PM IST = 16:30 UTC
name: Valmo Hardstop

on:
  schedule:
    - cron: '30 10 * * *'   # 4:00 PM IST (10:30 UTC)
    - cron: '30 16 * * *'   # 10:00 PM IST (16:30 UTC)
  workflow_dispatch:        # Manual trigger

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Chrome for WhatsApp image conversion
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true
          install-dependencies: true

      - name: Create service account key
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > service_account_key.json
          if [ ! -s service_account_key.json ] || [ "$SERVICE_ACCOUNT_JSON" = "{}" ]; then
            echo "ERROR: SERVICE_ACCOUNT_JSON secret missing or empty"
            exit 1
          fi
          echo "Service account key created"

      - name: Run Valmo Hardstop
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          # Same Chrome + driver pair from setup-chrome (avoids WDM downloading a mismatched driver)
          CHROMEDRIVER: ${{ steps.chrome.outputs.chromedriver-path }}
          # Optional: Render html-to-image-service URL — skips local Chrome if set
          HTML_TO_IMAGE_SERVICE_URL: ${{ secrets.HTML_TO_IMAGE_SERVICE_URL }}
        run: python valmo_hardstop_gmail_to_sheet.py

      - name: Cleanup
        if: always()
        run: rm -f service_account_key.json
